apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cosy-backend
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: cosy
    server: https://kubernetes.default.svc
  source:
    path: kubernetes/backend
    repoURL: https://github.com/Magenta-Mause/Cosy-Internal-Deployment
    targetRevision: main
  project: cosy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true

